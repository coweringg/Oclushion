[package]
name = "code-intelligence"
version = "0.1.0"
edition = "2021"
description = "Oxc-based code intelligence for Oclushion: incremental parsing, semantic analysis, security/cost pattern detection"

[lib]
name = "code_intelligence"

[dependencies]
# Oxc parser suite (v0.135)
oxc_parser = "0.135"
oxc_semantic = "0.135"
oxc_ast = "0.135"
oxc_diagnostics = "0.135"
oxc_allocator = "0.135"
oxc_span = "0.135"

# Concurrency & caching
dashmap = "6"
rayon = "1"
sha2 = "0.10"
notify = "7"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
thiserror = "2"

# File watching (async)
tokio = { version = "1", features = ["full"] }
crossbeam = "0.8"

# WASM compatibility
wasm-bindgen = "0.2"
js-sys = "0.3"

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "parse_large_project"
harness = false

[[bench]]
name = "incremental_reparse"
harness = false

[features]
default = []
tauri = []
