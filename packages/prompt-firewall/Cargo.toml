[package]
name = "prompt-firewall"
version = "0.1.0"
edition = "2021"
description = "Prompt injection detection & prevention firewall for Oclushion: pattern matching, entropy analysis, classification"

[lib]
name = "prompt_firewall"

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
base64 = "0.22"
regex = "1"

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "scan_bench"
harness = false
