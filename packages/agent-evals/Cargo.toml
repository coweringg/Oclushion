[package]
name = "agent-evals"
version = "0.1.0"
edition = "2021"
description = "Agent evaluation & leaderboard system for Oclushion: metrics collection, scoring, A/B testing, trend detection"

[lib]
name = "agent_evals"

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
rand = "0.8"

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "scoring_bench"
harness = false
