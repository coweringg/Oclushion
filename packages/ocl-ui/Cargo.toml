[package]
name = "oclushion-ui"
version = "0.1.0"
edition = "2024"
description = "GPU-accelerated native UI engine for Oclushion IDE"

[lib]
crate-type = ["lib", "cdylib"]
name = "oclushion_ui"

[dependencies]
wgpu = "29"
winit = "0.30"
cosmic-text = "0.12"
accesskit = "0.14"
accesskit_winit = "0.25"
image = "0.25"
log = "0.4"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
unicode-general-category = "0.6"
unicode-script = "0.5"
fxhash = "0.2"
bytemuck = { version = "1", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"
parking_lot = "0.12"
smallvec = "1"
pollster = "0.4"
raw-window-handle = "0.6"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = "0.3"

[target.'cfg(target_os = "windows")'.dependencies.windows-sys]
version = "0.52"
features = [
  "Win32_Foundation",
  "Win32_UI_WindowsAndMessaging",
]

[dev-dependencies]
tempfile = "3"

[[bench]]
name = "layout_bench"
harness = false

[[bench]]
name = "render_bench"
harness = false

[[bench]]
name = "text_shaping_bench"
harness = false
