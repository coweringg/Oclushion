[package]
name = "agent-canvas"
version = "0.1.0"
edition = "2021"
description = "Visual workflow orchestration engine for Oclushion: DAG execution, node types, data flow, serialization"

[lib]
name = "agent_canvas"

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "dag_bench"
harness = false
