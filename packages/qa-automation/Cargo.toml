[package]
name = "qa-automation"
version = "0.1.0"
edition = "2021"
description = "Stagehand browser automation sidecar manager for Oclushion: test execution, evidence capture, visual QA"

[lib]
name = "qa_automation"

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
zip = "2"

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "ipc_bench"
harness = false
