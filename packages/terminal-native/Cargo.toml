[package]
name = "oclushion-terminal-native"
version = "1.0.0"
edition = "2024"
description = "Native terminal renderer for Oclushion IDE powered by libghostty"
license = "MIT"

[lib]
crate-type = ["staticlib", "cdylib"]
name = "oclushion_terminal_native"

[dependencies]
libc = "0.2"
raw-window-handle = "0.6"
log = "0.4"
env_logger = "0.11"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(unix)'.dependencies]
signal-hook = "0.3"
nix = { version = "0.29", features = ["fs", "term", "signal"] }

[target.'cfg(windows)'.dependencies.windows-sys]
version = "0.52"
features = [
  "Win32_System_Console",
  "Win32_System_Pipes",
  "Win32_Foundation",
  "Win32_System_Threading",
  "Win32_Security",
]

[build-dependencies]
bindgen = "0.69"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"

[[bench]]
name = "throughput_bench"
harness = false

[[bench]]
name = "latency_bench"
harness = false
