[package]
name = "mcp-client"
version = "0.1.0"
edition = "2021"
description = "Model Context Protocol client for Oclushion: stdio/SSE transport, tool execution, resource access, permissions"

[lib]
name = "mcp_client"

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "transport_bench"
harness = false
