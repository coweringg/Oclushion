[package]
name = "hive-memory"
version = "0.1.0"
edition = "2021"
description = "Persistent vector memory with LanceDB for Oclushion: embeddings, semantic search, lifecycle, sync"

[lib]
name = "hive_memory"

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v7", "serde"] }
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
aes-gcm = "0.10"
pbkdf2 = "0.12"

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "search_bench"
harness = false
