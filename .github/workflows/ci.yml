name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  node:
    name: Node workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: node scripts/validate-i18n.mjs
      - run: pnpm audit --audit-level=high
      - run: docker compose up -d postgres
      - run: pnpm test
        env:
          CONTROL_API_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/sano
      - run: pnpm build

  pii-service:
    name: PII service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sano-shield-pii-service
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install ".[test]"
      - run: pytest

  e2e:
    name: E2E and a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install "./packages/sano-shield-pii-service[test]"
      - run: pnpm exec playwright install --with-deps chromium
      - run: docker compose up -d postgres redis
        env:
          POSTGRES_PASSWORD: postgres
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/oclushion
      - run: pnpm test:e2e

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.9.0
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @oclushion/web build
      - name: Start web target
        run: |
          cd apps/web
          node .next/standalone/server.js > /tmp/oclushion-web.log 2>&1 &
          cd ${{ github.workspace }}
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/login > /dev/null; then exit 0; fi
            sleep 2
          done
          cat /tmp/oclushion-web.log
          exit 1
      - name: Run ZAP baseline
        run: |
          mkdir -p test-results/zap
          docker run --rm --network host \
            -v "$PWD/test-results/zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://127.0.0.1:3000 \
            -r zap-baseline.html \
            -J zap-baseline.json \
            -m 2
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: zap-baseline
          path: test-results/zap
