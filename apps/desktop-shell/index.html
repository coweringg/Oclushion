<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Oclushion desktop shell: AI-ready workspaces, Sano Shield privacy, repo intelligence and safe diffs."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Oclushion</title>
  </head>
  <body>
    <div id="splash-screen" class="splash-screen">
      <div class="splash-content">
        <div class="splash-logo">
          <span class="splash-logo-icon"></span>
        </div>
        <h1 class="splash-title">Oclushion</h1>
        <p class="splash-subtitle">AI-Native Development IDE</p>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>
    </div>

    <div class="oclushion-root">
      <nav id="org-sidebar" class="ocl-org-sidebar"></nav>

      <nav id="activity-bar" class="ocl-activity-bar"></nav>

      <aside id="context-pane" class="ocl-context-pane">
        <div id="rooms-panel" class="ocl-panel ocl-panel-top">
        </div>
        <div class="ocl-resizer"></div>
        <div id="file-explorer" class="ocl-panel ocl-panel-bottom">
        </div>
      </aside>

      <main class="ocl-main-area">
        <header class="ocl-top-bar">
          <div id="ocl-menubar-mount"></div>
          <div class="ocl-breadcrumb">
            <span>Oclushion</span>
            <span class="ocl-breadcrumb-sep">›</span>
            <span>Frontend</span>
            <span class="ocl-breadcrumb-sep">›</span>
            <span>main</span>
            <span class="ocl-breadcrumb-sep">›</span>
            <span>src/app</span>
          </div>
          <div class="ocl-top-spacer"></div>
          <div style="display: flex; gap: 16px; align-items: center;">
            <div id="ocl-agi-switch-mount"></div>
            <div id="ocl-analytics-mount"></div>
            <div id="ocl-notifications-mount"></div>
          </div>
        </header>

        <nav id="ocl-os-tabs-mount"></nav>

        <div id="ocl-view-port" class="ocl-view-port">
          <div id="app" class="ocl-view active"></div>

          <div id="agi-swarm-overlay" class="agi-swarm-overlay"></div>
          
          <div id="time-travel-root" class="ocl-time-travel-mount"></div>
        </div>
      </main>
      
      <div id="command-palette-root"></div>

      <footer id="ocl-status-bar" class="ocl-status-bar"></footer>
    </div>
    
    <div id="context-menu-root"></div>
    <div id="toast-container" class="ocl-toast-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
